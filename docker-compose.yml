services:
  app:
    build: .
    command: npm start
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      CONTAINER_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1))"]
      interval: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - meiuss

  db:
    image: postgres:16-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: meiuss
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - meiuss

  evolution-api:
    image: evolutionapi/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - STORAGE_TYPE=sqlite
      - DATABASE_URL=file:/data/evolution.db
      - AUTHENTICATION_KEY=${EVOLUTION_API_KEY:-change-me}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-change-me}
    volumes:
      - evolution_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - meiuss

volumes:
  db_data:
  evolution_data:

networks:
  meiuss:
